name: Daily Scraper

on:
  schedule:
    - cron: '0 2 * * *'  # Jam 09.00 WIB setiap hari
  workflow_dispatch:       # Bisa dijalankan manual juga

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DB_PATH: data/ai_saas.db
        run: python -m scraper.run_scraper
      
      - name: Trigger Railway redeploy
        run: |
          curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}"
